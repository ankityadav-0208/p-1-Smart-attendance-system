<!DOCTYPE html>
<html>
<head>
    <title>Working Teacher Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 400px;
        }
        h2 { color: #1e3c72; text-align: center; }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #1e3c72;
            color: white;
            border: none;
            cursor: pointer;
        }
        .success { color: green; background: #e8f5e9; padding: 10px; border-radius: 5px; }
        .error { color: red; background: #ffebee; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>✅ Teacher Registration</h2>
        
        <input type="text" id="name" placeholder="Full Name" value="Working Teacher">
        <input type="email" id="email" placeholder="Email" value="working@university.edu">
        <input type="text" id="employeeId" placeholder="Employee ID" value="TCH999">
        <select id="department">
            <option value="Computer Science">Computer Science</option>
        </select>
        <input type="text" id="teacherCode" placeholder="Teacher Code" value="TEACH2024SECURE">
        <input type="password" id="password" placeholder="Password" value="password123">
        
        <button onclick="register()">Register Teacher</button>
        <div id="message"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <script>
        // YOUR CORRECT FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAO5xb4Xtu9JN0_mlGeOK5VzNMubpNS6VM",
            authDomain: "smart-attendance-system-02.firebaseapp.com",
            projectId: "smart-attendance-system-02",
            storageBucket: "smart-attendance-system-02.firebasestorage.app",
            messagingSenderId: "1004162494049",
            appId: "1:1004162494049:web:bd1a9ddc9b418ce0f80420",
            measurementId: "G-GZXE77CMS3"
        };

        // Initialize
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        async function register() {
            const msg = document.getElementById('message');
            
            if (document.getElementById('teacherCode').value !== 'TEACH2024SECURE') {
                msg.innerHTML = '<div class="error">❌ Wrong teacher code</div>';
                return;
            }
            
            try {
                msg.innerHTML = '<div class="success">📝 Creating account...</div>';
                
                // Create auth user
                const userCredential = await auth.createUserWithEmailAndPassword(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
                
                const userId = userCredential.user.uid;
                
                msg.innerHTML = '<div class="success">✅ Auth created. Saving data...</div>';
                
                // Save to users
                await db.collection('users').doc(userId).set({
                    name: document.getElementById('name').value,
                    employeeId: document.getElementById('employeeId').value,
                    department: document.getElementById('department').value,
                    email: document.getElementById('email').value,
                    role: 'pending_teacher',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                msg.innerHTML = '<div class="success">✅ User saved. Creating approval...</div>';
                
                // Save to teacher_approvals
                await db.collection('teacher_approvals').doc(userId).set({
                    userId: userId,
                    name: document.getElementById('name').value,
                    employeeId: document.getElementById('employeeId').value,
                    department: document.getElementById('department').value,
                    email: document.getElementById('email').value,
                    status: 'pending',
                    requestedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                msg.innerHTML = '<div class="success">✅✅ SUCCESS! Check admin dashboard.</div>';
                
            } catch (error) {
                msg.innerHTML = '<div class="error">❌ Error: ' + error.message + '</div>';
            }
        }
    </script>
</body>
</html>
