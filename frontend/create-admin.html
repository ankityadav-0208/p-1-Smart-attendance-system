<!DOCTYPE html>
<html>
<head>
    <title>Create Admin - Smart Attendance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 400px;
        }
        h2 {
            color: #1e3c72;
            margin-bottom: 20px;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #1e3c72;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        button:hover {
            background: #2a5298;
        }
        .success {
            color: #28a745;
            text-align: center;
            margin-top: 10px;
        }
        .error {
            color: #dc3545;
            text-align: center;
            margin-top: 10px;
        }
        .note {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Admin Account</h2>
        
        <div class="note">
            <strong>Note:</strong> Use the master code "SUPER_ADMIN_2024" to create admin.
        </div>
        
        <input type="text" id="name" placeholder="Full Name" value="System Admin">
        <input type="email" id="email" placeholder="Email" value="admin@university.edu">
        <input type="password" id="password" placeholder="Password" value="Admin@123">
        <input type="text" id="masterCode" placeholder="Master Admin Code" value="SUPER_ADMIN_2024">
        
        <button onclick="createAdmin()">Create Admin Account</button>
        
        <div id="message"></div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <script>
        // Your Firebase configuration
        const firebaseConfig = {
        apiKey: "AIzaSyAO5xb4Xtu9JN0_mlGeOK5VzNMubpNS6VM",
        authDomain: "smart-attendance-system-02.firebaseapp.com",
        projectId: "smart-attendance-system-02",
        storageBucket: "smart-attendance-system-02.firebasestorage.app",
        messagingSenderId: "1004162494049",
        appId: "1:1004162494049:web:bd1a9ddc9b418ce0f80420",
        measurementId: "G-GZXE77CMS3"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        async function createAdmin() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const masterCode = document.getElementById('masterCode').value;
            const messageDiv = document.getElementById('message');

            // Verify master code
            if (masterCode !== "SUPER_ADMIN_2024") {
                messageDiv.innerHTML = '<div class="error">❌ Invalid master code!</div>';
                return;
            }

            try {
                // Create user in Firebase Auth
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Add user data to Firestore
                await db.collection('users').doc(user.uid).set({
                    name: name,
                    email: email,
                    role: 'admin',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                messageDiv.innerHTML = '<div class="success">✅ Admin created successfully! You can now login.</div>';
                
                // Clear form
                document.getElementById('name').value = '';
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
                document.getElementById('masterCode').value = '';

                // Show success and redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);

            } catch (error) {
                let errorMessage = 'Error creating admin: ';
                switch(error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage += 'Email already exists';
                        break;
                    case 'auth/weak-password':
                        errorMessage += 'Password too weak (min 6 characters)';
                        break;
                    case 'auth/invalid-email':
                        errorMessage += 'Invalid email address';
                        break;
                    default:
                        errorMessage += error.message;
                }
                messageDiv.innerHTML = `<div class="error">❌ ${errorMessage}</div>`;
            }
        }
    </script>
</body>
</html>
